name: Build-OpenWrt_Multi-Platform(V6)_Test

on:
  repository_dispatch:
    types: [openwrt_source_update_v6_test]
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write
  actions: write    # 允许脚本去触发重试工作流

env:
  MAKE_DEFCONFIG_SH: compile_script/step01_make_defconfig.sh
  GENERATE_RELEASE_TAG_SH: compile_script/step02_generate_release_tag.sh
  GENERATE_GIT_LOG_SH: compile_script/step03_generate_git_log.sh
  UPDATE_GIT_LOG_SH:  compile_script/step06_update_git_log.sh
  ORGANIZE_TAG_SH: compile_script/step07_organize_tag.sh
  PLATFORMS_SH: compile_script/platforms.sh
  MATRIX_STATUS_SH: compile_script/matrix_job_status.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_ARTIFACT: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  job_init: 
    runs-on: ubuntu-latest
    name: Init
    outputs:
      output_release_tag: ${{ steps.gen_release_tag.outputs.release_tag }}
      platforms: ${{ steps.read-platforms.outputs.matrix }}
      platforms_source: ${{ steps.read-platforms.outputs.source_matrix_json }}
    steps:
      - name: Generate Tag Name
        id: gen_release_tag
        run: |
          echo "release_tag=multi-platform_$(date +"%Y.%m.%d_%H.%M.%S")" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read Platforms From File
        id: read-platforms
        run: |
          bash $PLATFORMS_SH
  
  job_source_init:
    needs: job_init
    runs-on: ${{ matrix.value.OS }}
    name: Source-Init-${{ matrix.source_code_platform }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.job_init.outputs.platforms_source) }}
    steps:
      - name: Init System
        id: init
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown -R $USER:$GROUPS /workdir
          cd /workdir
          sudo mkdir -p output
          sudo chown -R $USER:$GROUPS /workdir/output
          ln -sf /workdir/output $GITHUB_WORKSPACE/output
          df -hT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Clone Source Code
        working-directory: /workdir
        run: |
          git clone -b ${{matrix.value.REPO_BRANCH}} --single-branch ${{ matrix.value.REPO_URL }} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load Custom Feeds
        run: |
          chmod +x ${{ matrix.value.DIY_P1_SH }}
          cd openwrt
          $GITHUB_WORKSPACE/${{ matrix.value.DIY_P1_SH }}
          echo "feeds_Conf:------------------------"
          cat feeds.conf.default

      - name: Update Feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install Feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Pull the latest changes and Create temporary branch
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          git checkout -b temp-${{ matrix.source_code_platform }}

      - name: Make Defconfig Custom Configuration
        run: |
          chmod +x ${{ matrix.value.DIY_P2_SH }}
          chmod +x $MAKE_DEFCONFIG_SH
          cd openwrt
          $GITHUB_WORKSPACE/${{ matrix.value.DIY_P2_SH }}
          $GITHUB_WORKSPACE/$MAKE_DEFCONFIG_SH "${{ matrix.source_code_platform }}" "${{ matrix.value.CONFIGS }}"

      - name: Merge and push changes with "theirs" strategy
        run: |
          git checkout temp-${{ matrix.source_code_platform }}
          git add .

          if ! git diff --cached --quiet; then
            git config user.name "smallprogram"
            git config user.email "smallprogram@foxmail.com"
            git commit -m "Configuration: update code for ${{ matrix.source_code_platform }}"

            git checkout ${{ github.ref_name }}
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            git checkout temp-${{ matrix.source_code_platform }}
            git merge origin/${{ github.ref_name }} --no-ff --strategy-option theirs --no-edit || {
              echo "Merge conflict in temp branch, please resolve manually."
              exit 100
            }

            git checkout ${{ github.ref_name }} 
            git merge temp-${{ matrix.source_code_platform }} --strategy-option theirs --no-edit
            git push origin ${{ github.ref_name }} --force
            git branch -d temp-${{ matrix.source_code_platform }} || echo "Local temp-${{ matrix.source_code_platform }} not found"
            git push origin --delete temp-${{ matrix.source_code_platform }} || echo "Remote temp-${{ matrix.source_code_platform }} not found"
          else
            echo "No changes to commit."
          fi

      - name: Generate Source Packages
        working-directory: /workdir
        id: generate_image
        run: |
          tar -czf output/output.tar.gz openwrt/
          echo "SOURCE_PATH=$PWD" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Source To Artifact
        uses: actions/upload-artifact@v7
        if: steps.generate_image.outputs.status == 'success'
        with:
          name: Source_${{ matrix.source_code_platform }}
          path: ${{ steps.generate_image.outputs.SOURCE_PATH }}/output/output.tar.gz
          retention-days: 5

      - name: Generate Git Log
        id: git_log
        run: |
          chmod +x $GENERATE_GIT_LOG_SH 
          $GITHUB_WORKSPACE/$GENERATE_GIT_LOG_SH "${{ matrix.source_code_platform }}"
          
      - name: Upload Git Log To Artifact
        uses: actions/upload-artifact@v7
        if: steps.git_log.outputs.status == 'success'
        with:
          name: git_log_${{ matrix.source_code_platform }}
          path: git_log_${{ matrix.source_code_platform }}.txt
          retention-days: 5

      - name: Generate Release Tag
        id: tag
        run: |
          chmod +x $GENERATE_RELEASE_TAG_SH
          $GITHUB_WORKSPACE/$GENERATE_RELEASE_TAG_SH "${{ needs.job_init.outputs.output_release_tag }}" "${{ matrix.source_code_platform }}" "${{ matrix.value.CONFIGS }}"
      
      - name: Upload Release Tag To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release_${{ matrix.source_code_platform }}
          path: release_${{ matrix.source_code_platform }}.txt
          retention-days: 5

  job_generate_release_tag: 
    needs: [job_init, job_source_init]
    runs-on: ubuntu-latest
    name: Generate-Release-Tag-And-Git-Log
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull the latest changes and Create temporary branch
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          git checkout -b temp-tag-gitlog

      - name: Download Git Log From Artifacts
        id : download_gitlog
        uses: actions/download-artifact@v8
        with:
          pattern: git_log_*
          merge-multiple: true

      - name: Download Release Tag From Artifacts
        id : download_releasetag
        uses: actions/download-artifact@v8
        with:
          pattern: release_*
          merge-multiple: true

      - name: Generate Release Tag
        id: tag
        run: |
          chmod +x $UPDATE_GIT_LOG_SH
          $GITHUB_WORKSPACE/$UPDATE_GIT_LOG_SH "${{ needs.job_init.outputs.output_release_tag }}"

      - name: Upload Tags To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release_tag
          path: release.txt
          retention-days: 5

      - name: Create Release Tag
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.job_init.outputs.output_release_tag }}
          body_path: release.txt

      - name: Merge and push changes with "theirs" strategy
        run: |
          git checkout temp-tag-gitlog
          rm -rf release.txt
          git add .

          if ! git diff --cached --quiet; then
            git config user.name "smallprogram"
            git config user.email "smallprogram@foxmail.com"
            git commit -m "Git Log: update code"
            git checkout ${{ github.ref_name }}
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            git checkout temp-tag-gitlog
            git merge origin/${{ github.ref_name }} --no-ff --strategy-option theirs --no-edit || { exit 100; }
            git checkout ${{ github.ref_name }} 
            git merge temp-tag-gitlog --strategy-option theirs --no-edit
            git push origin ${{ github.ref_name }} --force
            git branch -d temp-tag-gitlog || echo "Local temp-tag-gitlog not found"
            git push origin --delete temp-tag-gitlog || echo "Remote temp-tag-gitlog not found"
          else
            echo "No changes to commit."
          fi

  job_build:
    needs: [job_init, job_source_init, job_generate_release_tag]
    runs-on: ${{ matrix.value.OS }}
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.job_init.outputs.platforms) }}
    name: Build-${{ matrix.source_code_platform }}-${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Matrix Status
        id: matrix_status
        run: |
            chmod +x $MATRIX_STATUS_SH
            $GITHUB_WORKSPACE/$MATRIX_STATUS_SH "${{ github.token }}" "${{ github.repository }}" "${{ github.run_id }}" "${{ fromJSON(github.run_attempt) }}" "Build-${{ matrix.source_code_platform }}-${{ matrix.platform }}"

      - name: Server Info
        if: steps.matrix_status.outputs.status != 'success'
        run: |
            echo "---------------------CPU Info--------------------"
            lscpu
            echo "---------------------RAM Info--------------------"
            free -h

      - name: Initialization Environment
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown -R $USER:$GROUPS /workdir
          df -hT
  
      - name: Maximize Build Space
        uses: smallprogram/maximize-build-diskspace@main
        if: steps.matrix_status.outputs.status != 'success'
        with:
          root-reserve-mb: 3072
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          build-mount-path: '/workdir'
          
      - name: Install Packages
        if: steps.matrix_status.outputs.status != 'success'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # sudo -E apt-get -qq update
          # sudo -E apt-get -qq install $(curl -fsSL https://github.com/smallprogram/OpenWrtAction/raw/main/diy_script/${{ matrix.source_code_platform }}_dependence)
          sudo timedatectl set-timezone "$TZ"

      - name: Initialization Directory
        working-directory: /workdir
        id: init_directory
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          sudo mkdir -p openwrt
          sudo mkdir -p download
          sudo chown -R $USER:$GROUPS /workdir/openwrt
          sudo chown -R $USER:$GROUPS /workdir/download
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          ln -sf /workdir/download $GITHUB_WORKSPACE/download

      - name: Relocate Docker to /workdir
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          echo "==== 1. 停止 Docker 服务 ===="
          sudo systemctl stop docker
          
          echo "==== 2. 迁移 Docker 数据目录到宽敞的 /workdir ===="
          sudo mkdir -p /workdir/docker
          echo '{"data-root": "/workdir/docker"}' | sudo tee /etc/docker/daemon.json
          
          echo "==== 3. 重启 Docker 服务 ===="
          sudo systemctl start docker
          
          echo "==== 4. 验证迁移是否成功 ===="
          docker info | grep "Docker Root Dir"

      - name: Login to GitHub Container Registry
        if: steps.matrix_status.outputs.status != 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Entire OpenWrt Cache from GHCR
        id: restore_cache
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PLATFORM_NAME=$(echo "${{ matrix.source_code_platform }}-${{ matrix.platform }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_OWNER/openwrt-full-cache-$PLATFORM_NAME:latest"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          
          if docker pull $IMAGE_NAME; then
            echo "Cache found! Extracting entire directory..."
            docker create --name cache_container $IMAGE_NAME /bin/true
            # 先删掉前面初始化生成的空目录，彻底消灭“套娃”隐患
            sudo rm -rf /workdir/openwrt
            
            # 直接原封不动地拷贝整个目录（保留 .git 隐藏文件夹）
            docker cp cache_container:/openwrt /workdir/
            
            docker rm cache_container
            sudo chown -R $USER:$GROUPS /workdir/openwrt
            echo "cache_hit=true" >> $GITHUB_OUTPUT
          else
            echo "No cache found on GHCR. This will be a clean build."
            echo "cache_hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Force Sync Source & Run DIY Scripts (If Cache Hit)
        if: steps.matrix_status.outputs.status != 'success' && steps.restore_cache.outputs.cache_hit == 'true'
        working-directory: /workdir/openwrt
        run: |
          echo "0. 配置 Git 安全目录 (防止 Docker 还原后产生权限所有者报错)..."
          git config --global --add safe.directory /workdir/openwrt
          
          echo "1. 强制同步主仓库源码 (覆盖本地更改，保留编译生成的缓存目录)..."
          git fetch origin
          git reset --hard origin/${{matrix.value.REPO_BRANCH}}
          
          echo "2. 清理旧的 feeds 索引和软链接，防止 DIY 脚本冲突..."
          ./scripts/feeds clean
          
          echo "3. 重新运行 DIY_P1_SH (加载自定义配置/源)..."
          chmod +x $GITHUB_WORKSPACE/${{ matrix.value.DIY_P1_SH }}
          $GITHUB_WORKSPACE/${{ matrix.value.DIY_P1_SH }}
          
          echo "4. 更新和安装 feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          echo "5. 重新运行 DIY_P2_SH (修改配置/应用补丁)..."
          chmod +x $GITHUB_WORKSPACE/${{ matrix.value.DIY_P2_SH }}
          $GITHUB_WORKSPACE/${{ matrix.value.DIY_P2_SH }}

      - name: Download Source Artifact (If Cache Miss)
        if: steps.matrix_status.outputs.status != 'success' && steps.restore_cache.outputs.cache_hit == 'false'
        uses: actions/download-artifact@v8
        with:
          name: Source_${{ matrix.source_code_platform }}
          path: download

      - name: File Extraction (If Cache Miss)
        if: steps.matrix_status.outputs.status != 'success' && steps.restore_cache.outputs.cache_hit == 'false'
        working-directory: /workdir
        run: |
          # Artifacts 下载后的路径直接在 download 根目录
          tar -xzf download/output.tar.gz
          rm -rf download/output.tar.gz
          sudo chown -R $USER:$GROUPS /workdir/openwrt

      - name: Load Configuration
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          [ -e ${{ matrix.value.CONFIGS }}/${{ matrix.platform }}.config ] && cp -r ${{ matrix.value.CONFIGS }}/${{ matrix.platform }}.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download Package
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          echo "==== SIMULATION MODE: Skipping full download ===="
          cd $GITHUB_WORKSPACE/openwrt
          # make download -j8
          # find dl -size -1024c -exec rm -f {} \;
     
      - name: SSH connection to Actions
        uses: mxschmitt/action-tmate@v3.23
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')

      - name: Compile Toolchain and Firmware
        id: compile
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          cd openwrt
          df -h
          is_complie_error=0
          chmod +x $GITHUB_WORKSPACE/${{ matrix.value.DIY_P3_SH }} || true
          

          echo "==== 开始模拟真实的巨型编译环境 ===="
          
          # 1. 模拟 10GB+ 的 build_dir (匹配你 layer1, layer2, layer3 的切割规则)
          mkdir -p build_dir/hostpkg build_dir/toolchain-dummy_gcc build_dir/host
          
          echo "-> 伪造 build_dir/hostpkg (4700MB)..."
          dd if=/dev/zero of=build_dir/hostpkg/dummy.bin bs=1M count=4700
          
          echo "-> 伪造 build_dir/toolchain-* (4000MB)..."
          dd if=/dev/zero of=build_dir/toolchain-dummy_gcc/dummy.bin bs=1M count=4000
          
          echo "-> 伪造 build_dir/host (1600MB)..."
          dd if=/dev/zero of=build_dir/host/dummy.bin bs=1M count=1600
          
          # 2. 模拟 5GB+ 的 staging_dir (匹配你 layer5, layer6 的切割规则)
          mkdir -p staging_dir/target-dummy_musl staging_dir/hostpkg
          
          echo "-> 伪造 staging_dir/target-* (2800MB)..."
          dd if=/dev/zero of=staging_dir/target-dummy_musl/dummy.bin bs=1M count=2800
          
          echo "-> 伪造 staging_dir/hostpkg (1600MB)..."
          dd if=/dev/zero of=staging_dir/hostpkg/dummy.bin bs=1M count=1600
          
          # 3. 模拟即将被“极限瘦身”无情删掉的 bin 目录 (生成假固件和假包，用于测试上传)
          mkdir -p bin/targets/dummy_arch/dummy_board
          mkdir -p bin/packages/dummy_arch/dummy_feed
          
          echo "-> 伪造 bin/targets 固件文件 (100MB)..."
          dd if=/dev/zero of=bin/targets/dummy_arch/dummy_board/${{ matrix.source_code_platform }}-openwrt-dummy-firmware.img bs=1M count=100
          echo "dummy buildinfo data" > bin/targets/dummy_arch/dummy_board/config.buildinfo
          
          echo "-> 伪造 bin/packages 软件包 (50MB)..."
          dd if=/dev/zero of=bin/packages/dummy_arch/dummy_feed/${{ matrix.source_code_platform }}-dummy-app.ipk bs=1M count=50

          # 4. 给 .git 塞点东西，让 layer8 也有存在感
          mkdir -p .git
          echo "-> 伪造 .git/ 仓库大文件 (500MB)..."
          dd if=/dev/zero of=.git/dummy_pack.pack bs=1M count=500

          echo "==== 伪造完成！当前 openwrt 目录大小分布如下： ===="
          du -h --max-depth=2 . | sort -hr | head -n 20

          df -h

          if [ "$is_complie_error" -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit $is_complie_error
          fi

      - name: Upload Bin Directory To Artifact
        uses: actions/upload-artifact@v7
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && steps.matrix_status.outputs.status != 'success'
        with:
          name: OpenWrt_bin_${{ matrix.source_code_platform }}_${{ matrix.platform }}
          path: openwrt/bin

      - name: Organize Files
        id: organize
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && steps.matrix_status.outputs.status != 'success' && !cancelled() 
        run: |
          cd $GITHUB_WORKSPACE/openwrt/bin/targets/*/*
          mkdir -p feeds_packages
          firmware_path=$PWD
          cd $GITHUB_WORKSPACE/openwrt/bin/packages/*/
          mv * $firmware_path/feeds_packages
          cd $firmware_path

          zip -r buildinfo_${{ matrix.source_code_platform }}_${{ matrix.platform }}.zip */
          find . -maxdepth 1 -type f ! -name '*-*-*' ! -name '*.zip' -exec zip buildinfo_${{ matrix.source_code_platform }}_${{ matrix.platform }}.zip {} +
          find . -mindepth 1 ! \( -name '*-*-*' -o -name '*.zip' \) -exec rm -rf {} +

          if [[ "${{ matrix.source_code_platform }}" == "lede" ]]; then
              for file in openwrt-*; do
                  if [[ -f "$file" ]]; then
                      mv "$file" "${file/openwrt-/lean-}"
                  fi
              done
          fi

          echo "FIRMWARE=$firmware_path" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Firmware Directory To Artifact
        uses: actions/upload-artifact@v7
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_ARTIFACT == 'true' && steps.matrix_status.outputs.status != 'success' && !cancelled()
        with:
          name: ${{ matrix.source_code_platform }}_${{ matrix.platform }}_firmware
          path: ${{ steps.organize.outputs.FIRMWARE }}
      
      - name: Save Cache to GHCR (Extreme Pruning & Precision Layering)
        if: steps.matrix_status.outputs.status != 'success' && always()
        run: |
          df -H
          echo "==== 1. 准备打包缓存：执行极限瘦身 ===="
          cd /workdir
          
          # 坚决删除无需缓存的巨型文件
          sudo rm -rf openwrt/bin 2>/dev/null || true
          sudo rm -rf openwrt/build_dir/target-* 2>/dev/null || true
          sudo rm -rf openwrt/logs 2>/dev/null || true
          sudo rm -rf openwrt/tmp 2>/dev/null || true
          sudo rm -rf openwrt/dl 2>/dev/null || true
          df -H
          echo "==== 2. 准备精细分层数据 (破解 10GB 物理死限) ===="
          # 创建独立的层级缓存目录（保持原有目录结构）
          mkdir -p layer1/build_dir layer2/build_dir layer3/build_dir layer4
          mkdir -p layer5/staging_dir layer6/staging_dir layer7
          mkdir -p layer8
          
          # 切割危险的 10.4G build_dir (每一层控制在 1.5G - 5G)
          sudo mv openwrt/build_dir/hostpkg ./layer1/build_dir/ 2>/dev/null || true
          sudo mv openwrt/build_dir/toolchain-* ./layer2/build_dir/ 2>/dev/null || true
          sudo mv openwrt/build_dir/host ./layer3/build_dir/ 2>/dev/null || true
          sudo mv openwrt/build_dir ./layer4/ 2>/dev/null || true
          
          # 切割 5G 的 staging_dir (虽然不到 10G，但分开传能防网络超时)
          sudo mv openwrt/staging_dir/target-* ./layer5/staging_dir/ 2>/dev/null || true
          sudo mv openwrt/staging_dir/hostpkg ./layer6/staging_dir/ 2>/dev/null || true
          sudo mv openwrt/staging_dir ./layer7/ 2>/dev/null || true
          
          # 移出 .git (约 1-2GB)
          sudo mv openwrt/.git ./layer8/ 2>/dev/null || true
          
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PLATFORM_NAME=$(echo "${{ matrix.source_code_platform }}-${{ matrix.platform }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_OWNER/openwrt-full-cache-$PLATFORM_NAME:latest"
          
          echo "==== 3. 生成精细分层 Dockerfile ===="
          cat <<EOF > Dockerfile
          FROM alpine:latest
          # 逐层合并，Docker 会在镜像内部完美还原 /openwrt 目录结构
          COPY layer1 /openwrt
          COPY layer2 /openwrt
          COPY layer3 /openwrt
          COPY layer4 /openwrt
          COPY layer5 /openwrt
          COPY layer6 /openwrt
          COPY layer7 /openwrt
          COPY layer8 /openwrt
          # 最后拷贝剩余极小的源码文件
          COPY openwrt /openwrt
          EOF
          
          echo "==== 4. 开始构建 Docker 缓存镜像 ===="
          docker build -t $IMAGE_NAME .
          
          echo "==== 5. 推送到 GHCR ===="
          docker push $IMAGE_NAME

  job_upload_release:
    needs: [job_init, job_source_init, job_generate_release_tag, job_build]
    runs-on: ${{ matrix.value.OS }}
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.job_init.outputs.platforms) }}
    name: Upload-${{ matrix.source_code_platform }}-${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Matrix Status
        id: matrix_status
        run: |
            chmod +x $MATRIX_STATUS_SH
            $GITHUB_WORKSPACE/$MATRIX_STATUS_SH "${{ github.token }}" "${{ github.repository }}" "${{ github.run_id }}" "${{ fromJSON(github.run_attempt) }}" "Upload-${{ matrix.source_code_platform }}-${{ matrix.platform }}"

      - name: Initialization Environment
        id: init
        if: steps.matrix_status.outputs.status != 'success'
        run: |
          sudo timedatectl set-timezone "$TZ"
          cd $GITHUB_WORKSPACE
          sudo mkdir -p release_download release_tag_download
          sudo chown -R $USER:$GROUPS release_download release_tag_download
          echo "release_dir=$PWD/release_download" >> $GITHUB_OUTPUT
          echo "release_tag_dir=$PWD/release_tag_download" >> $GITHUB_OUTPUT

      - name: Download Release From Artifacts
        id : download
        if: steps.matrix_status.outputs.status != 'success'
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.source_code_platform }}_${{ matrix.platform }}_firmware
          path: ${{ steps.init.outputs.release_dir }}

      - name: Download Tags
        if: steps.matrix_status.outputs.status != 'success'
        uses: actions/download-artifact@v8
        with:
          name: release_tag
          path: ${{ steps.init.outputs.release_tag_dir }}

      - name: Upload Firmware To Release
        if: steps.matrix_status.outputs.status != 'success'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.job_init.outputs.output_release_tag }}
          body_path: ${{ steps.init.outputs.release_tag_dir }}/release.txt
          files: |
            ${{ steps.init.outputs.release_dir }}/*

  job_organize_tags:
    needs: [job_init, job_source_init, job_generate_release_tag, job_build, job_upload_release]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Organize-Release-Tags
    outputs:
      output_tag_status: ${{ steps.organize_tags.outputs.status }}
        
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull the latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Download Tags
        uses: actions/download-artifact@v8
        with:
          name: release_tag

      - name: Organize Tags
        id: organize_tags
        run: |
            chmod +x $ORGANIZE_TAG_SH
            $GITHUB_WORKSPACE/$ORGANIZE_TAG_SH "${{ github.token }}" "${{ github.repository }}" "${{ github.run_id }}" "${{ fromJSON(github.run_attempt) }}" "3"

      - name: Upload Tags To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release_tag_final_attempt_${{ fromJSON(github.run_attempt) }}
          path: release.txt
          retention-days: 5

      - name: Update Release Tag
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.job_init.outputs.output_release_tag }}
          body_path: release.txt

  rerun-failed-jobs:
    runs-on: ubuntu-latest
    needs: [job_init, job_source_init, job_generate_release_tag, job_build, job_upload_release, job_organize_tags]
    if: failure() && fromJSON(github.run_attempt) < 3  && !cancelled()
    steps:
      - name: Rerun failed jobs in the current workflow
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Retry failed jobs for the ${{ fromJSON(github.run_attempt) }} time, Retry 3 times in total"
          gh workflow run Retry_Failure_Jobs.yml -F run_id=${{ github.run_id }}

  final-execution-jobs:
    runs-on: ubuntu-latest
    needs: [rerun-failed-jobs, job_organize_tags]
    if: ${{ always() }}
    steps:
      - name: Trigger build
        if: ${{ needs.rerun-failed-jobs.result == 'skipped' }}
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.MY_ADMIN_PAT }}
          repository: smallprogram/MyAction
          event-type: openwrt_compilation_completed