name: Retry_All_Jobs

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
permissions:
  actions: write

jobs:
    rerun:
        runs-on: ubuntu-latest
        steps:
            - name: rerun ${{ inputs.run_id }}
              env:
                  GH_REPO: ${{ github.repository }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh run watch ${{ inputs.run_id }} > /dev/null 2>&1 || true
                  gh run rerun ${{ inputs.run_id }}